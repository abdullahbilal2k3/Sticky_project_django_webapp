<!DOCTYPE html>
<html>
<head>
    <title>Sticky Notes</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; padding: 30px; }
        .form-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; margin-bottom: 30px; }
        input, textarea { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background: #28a745; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; }
        .grid { display: flex; flex-wrap: wrap; gap: 20px; }
        .card { background: #ffeb3b; padding: 20px; width: 200px; min-height: 150px; box-shadow: 5px 5px 7px rgba(0,0,0,0.1); position: relative; transform: rotate(-1deg); }
        .del { color: red; position: absolute; top: 5px; right: 10px; text-decoration: none; font-weight: bold; }
        .edit { display: block; margin-top: 10px; font-size: 12px; color: #555; text-decoration: none; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 5px; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>New Note 📝</h2>
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="title" placeholder="Title" required>
            <textarea name="content" placeholder="Content..." required></textarea>
            <button type="submit">Save Note</button>
        </form>
    </div>

    <div class="grid">
        {% for note in notes %}
        <div class="card">
            <a href="{% url 'delete_note' note.id %}" class="del" onclick="return confirm('Delete?')">×</a>
            <h3>{{ note.title }}</h3>
            <p>{{ note.content }}</p>
            <a href="{% url 'edit_note' note.id %}" class="edit">✏️ Edit</a>
        </div>
        {% endfor %}
    </div>
</body>
</html>
