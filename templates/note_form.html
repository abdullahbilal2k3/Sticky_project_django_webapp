{% extends 'base.html' %}
{% block content %}
<div style="max-width: 600px; margin: 0 auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
    <h2 style="color: #2c3e50; margin-bottom: 10px;">{% if note %}Edit Your Note ✏️{% else %}Create New Sticky 📝{% endif %}</h2>
    <p style="color: #7f8c8d; margin-bottom: 30px;">Capture your thoughts before they fade away.</p>
    
    <form method="POST">
        {% csrf_token %}
        
        <div style="margin-bottom: 20px;">
            <label style="display:block; margin-bottom:8px; font-weight:600; color: #34495e;">Title</label>
            <input type="text" name="title" value="{{ note.title|default:'' }}" 
                   placeholder="Give your note a catchy title..." required 
                   style="width: 100%; padding: 12px; border: 2px solid #ecf0f1; border-radius: 10px; font-size: 1rem; box-sizing: border-box;">
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display:block; margin-bottom:8px; font-weight:600; color: #34495e;">Your Thoughts</label>
            <textarea name="content" rows="8" placeholder="Start typing here..." required 
                      style="width: 100%; padding: 12px; border: 2px solid #ecf0f1; border-radius: 10px; font-size: 1rem; box-sizing: border-box; resize: vertical;">{{ note.content|default:'' }}</textarea>
        </div>

        <div style="margin-bottom: 30px;">
            <label style="display:block; margin-bottom:8px; font-weight:600; color: #34495e;">Note Color</label>
            <div style="display: flex; align-items: center; gap: 15px;">
                <input type="color" name="color" value="{{ note.color|default:'#FFFF99' }}" 
                       style="width: 60px; height: 40px; border: none; cursor: pointer; border-radius: 5px;">
                <span style="font-size: 0.9rem; color: #95a5a6;">Select a mood for your note.</span>
            </div>
        </div>

        <div style="display: flex; gap: 15px;">
            <button type="submit" style="flex: 2; padding: 15px; background: #3498db; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s;">
                {% if note %}Update Note{% else %}Save Sticky{% endif %}
            </button>
            <a href="{% url 'view_notes' %}" style="flex: 1; text-align: center; padding: 15px; background: #ecf0f1; color: #7f8c8d; text-decoration: none; border-radius: 10px; font-weight: bold; line-height: 1;">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
