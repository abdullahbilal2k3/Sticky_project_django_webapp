<!DOCTYPE html>
<html>
<head><title>Edit Note</title></head>
<body style="padding: 50px; font-family: sans-serif;">
    <h2>Edit Note ✏️</h2>
    <form method="POST">
        {% csrf_token %}
        <input type="text" name="title" value="{{ note.title }}" style="width: 300px;"><br><br>
        <textarea name="content" style="width: 300px; height: 150px;">{{ note.content }}</textarea><br><br>
        <button type="submit">Update Note</button>
        <a href="{% url 'home' %}">Cancel</a>
    </form>
</body>
</html>
